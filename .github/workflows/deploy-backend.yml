name: Deploy Backend to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies & Build Assets
        run: |
          npm install
          npm run build --if-present

      - name: Sync Files to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          server-dir: /public_html/admin.tix-eg.com/
          exclude: |
            **/.git*
            **/node_modules/**
            **/vendor/**
            .env
            .htaccess
            index.php
            storage/logs/**
            tests/**
            README.md

      - name: Run Remote Migrations
        run: |
          curl -k -s https://admin.tix-eg.com/run-migrations

      - name: Clear Laravel Cache
        run: |
          curl -k -s https://admin.tix-eg.com/clear-everything

      - name: Create Storage Link for Images
        run: |
          curl -k -s https://admin.tix-eg.com/run-storage-link
